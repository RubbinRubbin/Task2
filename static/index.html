<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Q&A</title>
    <style>
        :root {
            --primary: #4f6ef7;
            --primary-hover: #3b5de7;
            --primary-light: #eef2ff;
            --danger: #e55b5b;
            --danger-light: #fef2f2;
            --success: #34a853;
            --success-light: #f0fdf4;
            --warning: #e0a030;
            --warning-light: #fffbeb;
            --bg: #fafafa;
            --surface: #ffffff;
            --border: #ebebeb;
            --text: #1a1a1a;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .sidebar-header {
            padding: 24px 20px 20px;
        }

        .sidebar-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 16px;
        }

        /* Upload area */
        .upload-area {
            border: 1.5px dashed var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            background: var(--bg);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            margin-bottom: 8px;
        }

        .upload-icon svg {
            width: 28px;
            height: 28px;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .upload-area:hover .upload-icon svg,
        .upload-area.dragover .upload-icon svg {
            color: var(--primary);
        }

        .upload-area p {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .upload-area .formats {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Document list */
        .doc-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .doc-list-header {
            padding: 8px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .doc-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            transition: background 0.15s;
        }

        .doc-item:hover {
            background: var(--bg);
        }

        .doc-item.removing {
            opacity: 0;
            transform: translateX(-10px);
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            margin-top: 0;
            margin-bottom: 0;
            overflow: hidden;
            transition: opacity 0.2s ease, transform 0.2s ease, max-height 0.3s ease 0.1s, padding 0.3s ease 0.1s;
        }

        .doc-info {
            flex: 1;
            min-width: 0;
        }

        .doc-name {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .doc-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .doc-type-badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .doc-type-badge.md { background: #eef2ff; color: #4f6ef7; }
        .doc-type-badge.txt { background: #f0fdf4; color: #22863a; }
        .doc-type-badge.pdf { background: #fef2f2; color: #cf3333; }

        .btn-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.15s;
            flex-shrink: 0;
            line-height: 1;
        }

        .btn-delete:hover {
            color: var(--danger);
            background: var(--danger-light);
        }

        .empty-state {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.6;
        }

        /* Upload progress item */
        .upload-progress-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            background: var(--bg);
            margin-bottom: 4px;
            animation: fadeIn 0.2s ease;
        }

        .upload-progress-item .file-name {
            flex: 1;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .upload-progress-item .mini-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        .upload-progress-item .progress-bar-track {
            flex: 1;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .upload-progress-item .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 2px;
            animation: indeterminate 1.2s ease-in-out infinite;
        }

        .upload-progress-item.error {
            background: var(--danger-light);
        }

        .upload-progress-item.error .file-name {
            color: var(--danger);
        }

        .upload-progress-item.success {
            background: var(--success-light);
        }

        @keyframes indeterminate {
            0% { width: 0%; margin-left: 0%; }
            50% { width: 60%; margin-left: 20%; }
            100% { width: 0%; margin-left: 100%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Main area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg);
        }

        .main-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .main-header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* Chat area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .chat-message {
            max-width: 720px;
            margin: 0 auto 20px;
        }

        .chat-question {
            background: var(--primary);
            color: white;
            padding: 12px 16px;
            border-radius: 18px 18px 4px 18px;
            margin-left: auto;
            max-width: 80%;
            width: fit-content;
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .chat-answer {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px 18px 18px 18px;
            padding: 16px 20px;
            font-size: 14px;
            line-height: 1.7;
            box-shadow: var(--shadow-sm);
        }

        .chat-answer.unsupported {
            border-color: var(--warning);
            background: var(--warning-light);
        }

        .chat-answer pre {
            background: #f5f5f5;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            margin: 10px 0;
            font-size: 13px;
            border: 1px solid var(--border);
        }

        .chat-answer code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .chat-answer pre code {
            background: none;
            padding: 0;
            border: none;
        }

        .sources {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .sources-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
        }

        .source-chip {
            display: inline-block;
            padding: 4px 10px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            margin: 2px 4px 2px 0;
        }

        .unsupported-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #fef3c7;
            color: var(--warning);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        /* Welcome message (chatbot style) */
        .welcome-bubble {
            max-width: 720px;
            margin: 60px auto 0;
        }

        .welcome-bubble .chat-answer {
            max-width: 480px;
        }

        .welcome-bubble .bot-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        /* Input area */
        .input-area {
            padding: 16px 24px 20px;
            background: var(--bg);
        }

        .input-wrapper {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 6px 6px 6px 16px;
            transition: border-color 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.08);
        }

        .input-wrapper input {
            flex: 1;
            padding: 8px 0;
            border: none;
            font-size: 14px;
            outline: none;
            background: transparent;
            color: var(--text);
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .btn-send {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .btn-send:hover:not(:disabled) {
            background: var(--primary-hover);
        }

        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-indicator {
            max-width: 720px;
            margin: 0 auto 20px;
            padding: 16px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 13px;
            color: var(--text-secondary);
            box-shadow: var(--shadow-sm);
        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            background: var(--surface);
            color: var(--text);
            box-shadow: var(--shadow-md);
            animation: slideIn 0.3s ease;
            max-width: 340px;
            border-left: 3px solid var(--primary);
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.info { border-left-color: var(--primary); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Confirm modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.15s ease;
        }

        .modal-box {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .modal-box p {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
            margin-bottom: 20px;
        }

        .modal-box .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-box button {
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            transition: all 0.15s;
        }

        .modal-box button:hover {
            background: var(--bg);
        }

        .modal-box button.btn-confirm-delete {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .modal-box button.btn-confirm-delete:hover {
            background: #d04040;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                min-width: unset;
                height: auto;
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>

<!-- Sidebar: Document Management -->
<aside class="sidebar">
    <div class="sidebar-header">
        <h2>Documents</h2>
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept=".txt,.md,.pdf" multiple>
            <div class="upload-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.338-2.32 3.75 3.75 0 013.572 5.345A4.5 4.5 0 0117.25 19.5H6.75z" />
                </svg>
            </div>
            <p>Drop files or click to upload</p>
            <div class="formats">TXT, MD, PDF</div>
        </div>
    </div>
    <div class="doc-list" id="docList">
        <div class="empty-state" id="emptyState">
            No documents indexed yet.<br>Upload files to get started.
        </div>
    </div>
</aside>

<!-- Main: Q&A Chat -->
<main class="main">
    <div class="main-header">
        <h1>RAG Q&A</h1>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="welcome-bubble" id="welcomeMessage">
            <div class="bot-label">Assistant</div>
            <div class="chat-answer">
                Ciao! Carica dei documenti e fai una domanda. Cercherò le risposte per te.
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="questionInput" placeholder="Ask a question about your documents..." autocomplete="off">
            <button class="btn-send" id="sendBtn">Send</button>
        </div>
    </div>
</main>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
const API = '/api';

// --- Toast notifications ---
function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
}

// --- Custom confirm modal ---
function showConfirm(message) {
    return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
            <div class="modal-box">
                <p>${message}</p>
                <div class="modal-actions">
                    <button class="btn-cancel">Cancel</button>
                    <button class="btn-confirm-delete">Remove</button>
                </div>
            </div>
        `;

        overlay.querySelector('.btn-cancel').addEventListener('click', () => {
            overlay.remove();
            resolve(false);
        });
        overlay.querySelector('.btn-confirm-delete').addEventListener('click', () => {
            overlay.remove();
            resolve(true);
        });
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.remove();
                resolve(false);
            }
        });

        document.body.appendChild(overlay);
    });
}

// --- Upload progress ---
function createUploadProgress(fileName) {
    const docList = document.getElementById('docList');
    emptyState.style.display = 'none';

    const item = document.createElement('div');
    item.className = 'upload-progress-item';
    item.setAttribute('data-upload', fileName);
    item.innerHTML = `
        <div class="mini-spinner"></div>
        <span class="file-name">${escapeHtml(fileName)}</span>
        <div class="progress-bar-track"><div class="progress-bar-fill"></div></div>
    `;

    // Insert at top of doc list
    if (docList.firstChild) {
        docList.insertBefore(item, docList.firstChild);
    } else {
        docList.appendChild(item);
    }
    return item;
}

function removeUploadProgress(fileName) {
    const item = document.querySelector(`[data-upload="${CSS.escape(fileName)}"]`);
    if (item) item.remove();
}

function markUploadError(fileName, errorMsg) {
    const item = document.querySelector(`[data-upload="${CSS.escape(fileName)}"]`);
    if (item) {
        item.classList.add('error');
        item.innerHTML = `
            <span class="file-name">${escapeHtml(fileName)} — ${escapeHtml(errorMsg)}</span>
        `;
        setTimeout(() => item.remove(), 4000);
    }
}

// --- Document Management ---
async function loadDocuments() {
    try {
        const res = await fetch(`${API}/documents`);
        const data = await res.json();
        renderDocList(data.documents);
    } catch (e) {
        console.error('Failed to load documents:', e);
    }
}

const emptyState = document.getElementById('emptyState');

function renderDocList(docs) {
    const list = document.getElementById('docList');

    // Preserve any active upload progress items
    const activeUploads = Array.from(list.querySelectorAll('.upload-progress-item'));

    if (!docs || docs.length === 0) {
        list.innerHTML = '';
        activeUploads.forEach(u => list.appendChild(u));
        if (activeUploads.length === 0) {
            list.appendChild(emptyState);
            emptyState.style.display = 'block';
        }
        return;
    }

    emptyState.style.display = 'none';
    list.innerHTML = '<div class="doc-list-header">Indexed Files</div>';

    // Re-insert active upload items
    activeUploads.forEach(u => list.appendChild(u));

    docs.forEach(doc => {
        const item = document.createElement('div');
        item.className = 'doc-item';
        item.setAttribute('data-doc', doc.filename);
        item.innerHTML = `
            <div class="doc-info">
                <div class="doc-name">${escapeHtml(doc.filename)}</div>
                <div class="doc-meta">
                    <span class="doc-type-badge ${doc.type}">${doc.type}</span>
                    ${doc.chunks} chunks
                </div>
            </div>
            <button class="btn-delete" onclick="deleteDocument('${escapeHtml(doc.filename)}')" title="Remove document">&#x2715;</button>
        `;
        list.appendChild(item);
    });
}

async function uploadFile(file) {
    const formData = new FormData();
    formData.append('file', file);

    const progressItem = createUploadProgress(file.name);

    try {
        const res = await fetch(`${API}/documents/upload`, {
            method: 'POST',
            body: formData,
        });

        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Upload failed');
        }

        const data = await res.json();
        removeUploadProgress(file.name);
        showToast(data.message, 'success');
        loadDocuments();
    } catch (e) {
        markUploadError(file.name, e.message);
    }
}

async function deleteDocument(filename) {
    const confirmed = await showConfirm(`Remove <strong>${escapeHtml(filename)}</strong> from the index?`);
    if (!confirmed) return;

    // Animate removal
    const docItem = document.querySelector(`[data-doc="${CSS.escape(filename)}"]`);
    if (docItem) {
        docItem.style.maxHeight = docItem.offsetHeight + 'px';
        requestAnimationFrame(() => docItem.classList.add('removing'));
    }

    try {
        const res = await fetch(`${API}/documents/${encodeURIComponent(filename)}`, {
            method: 'DELETE',
        });

        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Delete failed');
        }

        const data = await res.json();
        showToast(data.message, 'success');

        // Wait for animation then refresh
        setTimeout(() => loadDocuments(), 300);
    } catch (e) {
        // Revert animation on error
        if (docItem) docItem.classList.remove('removing');
        showToast(`Error: ${e.message}`, 'error');
    }
}

// --- Upload events ---
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');

fileInput.addEventListener('change', (e) => {
    Array.from(e.target.files).forEach(uploadFile);
    fileInput.value = '';
});

uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
});

uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
});

uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    Array.from(e.dataTransfer.files).forEach(uploadFile);
});

// --- Q&A Chat ---
const chatArea = document.getElementById('chatArea');
const questionInput = document.getElementById('questionInput');
const sendBtn = document.getElementById('sendBtn');
let isAsking = false;

async function askQuestion() {
    const question = questionInput.value.trim();
    if (!question || isAsking) return;

    // Hide welcome
    const welcome = document.getElementById('welcomeMessage');
    if (welcome) welcome.style.display = 'none';

    // Show question
    appendQuestion(question);
    questionInput.value = '';
    isAsking = true;
    sendBtn.disabled = true;
    sendBtn.textContent = '...';

    // Show loading
    const loadingEl = document.createElement('div');
    loadingEl.className = 'loading-indicator';
    loadingEl.innerHTML = '<span class="spinner"></span> Searching documents and generating answer...';
    chatArea.appendChild(loadingEl);
    chatArea.scrollTop = chatArea.scrollHeight;

    try {
        const res = await fetch(`${API}/ask`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question }),
        });

        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Request failed');
        }

        const data = await res.json();
        loadingEl.remove();
        appendAnswer(data);
    } catch (e) {
        loadingEl.remove();
        appendError(e.message);
    } finally {
        isAsking = false;
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send';
    }
}

function appendQuestion(text) {
    const wrapper = document.createElement('div');
    wrapper.className = 'chat-message';
    wrapper.innerHTML = `<div class="chat-question">${escapeHtml(text)}</div>`;
    chatArea.appendChild(wrapper);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function appendAnswer(data) {
    const wrapper = document.createElement('div');
    wrapper.className = 'chat-message';

    let answerClass = 'chat-answer';
    if (!data.is_supported) answerClass += ' unsupported';

    let sourcesHtml = '';
    if (data.sources && data.sources.length > 0) {
        const chips = data.sources.map(s =>
            `<span class="source-chip">${escapeHtml(s.document)} (passage ${s.passage_number}, score: ${s.score})</span>`
        ).join('');
        sourcesHtml = `
            <div class="sources">
                <div class="sources-label">Sources</div>
                ${chips}
            </div>
        `;
    }

    let badgeHtml = '';
    if (!data.is_supported) {
        badgeHtml = '<div class="unsupported-badge">Answer not supported by documents</div>';
    }

    wrapper.innerHTML = `
        <div class="${answerClass}">
            <div>${formatAnswer(data.answer)}</div>
            ${badgeHtml}
            ${sourcesHtml}
        </div>
    `;
    chatArea.appendChild(wrapper);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function appendError(message) {
    const wrapper = document.createElement('div');
    wrapper.className = 'chat-message';
    wrapper.innerHTML = `
        <div class="chat-answer unsupported">
            <strong>Error:</strong> ${escapeHtml(message)}
        </div>
    `;
    chatArea.appendChild(wrapper);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function formatAnswer(text) {
    let html = escapeHtml(text);
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\n/g, '<br>');
    return html;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// --- Events ---
sendBtn.addEventListener('click', askQuestion);
questionInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        askQuestion();
    }
});

// Load documents on page load
loadDocuments();
</script>
</body>
</html>
